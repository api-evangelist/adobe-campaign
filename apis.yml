- name: Adobe Campaign Classic JavaScript SDK
  description: >-
    An open-source JavaScript SDK that wraps Adobe Campaign Classic SOAP APIs in
    a simple, expressive, JavaScript-idiomatic interface. The SDK supports
    asynchronous promise-based operations for querying, data management,
    workflow control, and session management. It works server-side with Node.js
    and client-side in the browser, abstracting away SOAP calls, XML-to-JSON
    conversion, and type formatting. Compatible with Campaign Classic v7 and v8.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://opensource.adobe.com/acc-js-sdk/
  baseURL: https://{instance}.campaign.adobe.com
  tags:
  - JavaScript SDK
  - Node.js
  - Campaign Classic
  - SOAP Wrapper
  - Open Source
  properties:
  - type: Documentation
    url: https://opensource.adobe.com/acc-js-sdk/
  - type: GitHubRepository
    url: https://github.com/adobe/acc-js-sdk
  - type: NPMPackage
    url: https://www.npmjs.com/package/@adobe/acc-js-sdk
- name: Adobe I/O Campaign Standard SDK
  description: >-
    A Node.js JavaScript SDK wrapping Adobe Campaign Standard REST APIs for use
    in Adobe I/O Runtime and App Builder applications. Provides convenience
    methods for profile management, service operations, workflow control,
    transactional messaging, GDPR compliance requests, and custom resource
    management. Handles authentication and API communication for building
    serverless integrations with Campaign Standard.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://github.com/adobe/aio-lib-campaign-standard
  baseURL: https://mc.adobe.io/{ORGANIZATION}/campaign
  tags:
  - JavaScript SDK
  - Node.js
  - Campaign Standard
  - Adobe I/O
  - App Builder
  properties:
  - type: Documentation
    url: https://github.com/adobe/aio-lib-campaign-standard/blob/master/README.md
  - type: GitHubRepository
    url: https://github.com/adobe/aio-lib-campaign-standard
  - type: NPMPackage
    url: https://www.npmjs.com/package/@adobe/aio-lib-campaign-standard
- name: Adobe Experience Platform Mobile SDK - Campaign Extensions
  description: >-
    Native mobile SDK extensions for iOS and Android that integrate Adobe
    Campaign push notifications, in-app messaging, and local notifications into
    mobile applications. Includes the Campaign Classic extension for v7 and v8
    providing device registration and notification click tracking, and the
    Campaign Standard extension providing push identifier management and message
    interaction tracking. Part of the Adobe Experience Platform Mobile SDK
    framework.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://developer.adobe.com/client-sdks/solution/adobe-campaign-classic/
  baseURL: https://api.example.com
  tags:
  - Mobile SDK
  - iOS
  - Android
  - Push Notifications
  - In-App Messaging
  properties:
  - type: Documentation
    url: https://developer.adobe.com/client-sdks/solution/adobe-campaign-classic/
